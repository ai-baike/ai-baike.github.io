<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 名词小词典</title>
<style>
  :root{
    --bg:#0f1117; --card:#1a1d27; --card2:#232735; --text:#e8eaf0;
    --muted:#9aa0b0; --accent:#7c9cff; --accent2:#5cd6c0; --line:#2a2e3d;
    --tag:#2d3346;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f6fb; --card:#ffffff; --card2:#f0f2f8; --text:#1a1d27;
      --muted:#646b7d; --accent:#3b5bdb; --accent2:#0ca678; --line:#e4e7ef; --tag:#eef1f8;}
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 80px}
  header{text-align:center;margin:14px 0 22px}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:.5px}
  .sub{color:var(--muted);font-size:14px}
  .search{position:sticky;top:0;z-index:5;padding:12px 0;background:linear-gradient(var(--bg) 70%,transparent)}
  .search input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:16px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px}
  .chip{padding:6px 13px;border-radius:20px;background:var(--tag);color:var(--muted);
    font-size:13px;cursor:pointer;border:1px solid transparent;user-select:none}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .count{color:var(--muted);font-size:13px;margin:6px 2px 12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin-bottom:12px;overflow:hidden;transition:border-color .15s}
  .card:hover{border-color:var(--accent)}
  .head{padding:15px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:12px}
  .head .main{flex:1;min-width:0}
  .abbr{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .say{border:none;background:var(--tag);color:var(--accent);cursor:pointer;
    font-size:14px;line-height:1;padding:4px 8px;border-radius:8px;flex:none}
  .say:hover{background:var(--accent);color:#fff}
  .say.playing{background:var(--accent2);color:#fff}
  .full{color:var(--accent2);font-size:13.5px;margin-top:1px}
  .zh{color:var(--muted);font-size:14px;margin-top:2px}
  .cat{font-size:11px;color:var(--muted);background:var(--tag);padding:3px 9px;border-radius:6px;white-space:nowrap}
  .arrow{color:var(--muted);transition:transform .2s;margin-top:4px}
  .card.open .arrow{transform:rotate(90deg)}
  .body{max-height:0;overflow:hidden;transition:max-height .25s ease;border-top:1px solid transparent}
  .card.open .body{max-height:600px;border-top-color:var(--line)}
  .body-in{padding:14px 18px 16px}
  .desc{font-size:15px;margin:0 0 14px;color:var(--text)}
  .links{display:flex;gap:10px;flex-wrap:wrap}
  .links a{text-decoration:none;font-size:14px;padding:8px 14px;border-radius:9px;
    background:var(--card2);color:var(--accent);border:1px solid var(--line);display:inline-flex;align-items:center;gap:6px}
  .links a:hover{border-color:var(--accent)}
  .links a.vid{color:var(--accent2)}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🧠 AI 名词小词典</h1>
    <div class="sub">点击词条展开解释 · 内含视频与百科链接</div>
  </header>

  <div class="search">
    <input id="q" type="text" placeholder="搜索名词、英文或中文…（例如 RAG、注意力、微调）" autocomplete="off">
    <div class="filters" id="filters"></div>
  </div>
  <div class="count" id="count"></div>
  <div id="list"></div>

  <footer>自己维护的迷你词典 · 直接编辑 index.html 里的 DATA 即可增删词条</footer>
</div>

<script>
/* ===== 词条数据：想加词，复制一段往里填即可 ===== */
const DATA = [
  {abbr:"LLM", full:"Large Language Model", zh:"大语言模型", cat:"基础",
   desc:"用海量文本训练、能理解和生成自然语言的超大规模神经网络（如 GPT、Claude）。核心能力来自预测“下一个词”，规模够大后涌现出推理、翻译、写代码等能力。",
   video:"https://www.youtube.com/watch?v=wjZofJX0v4M", wiki:"https://zh.wikipedia.org/wiki/大型语言模型"},

  {abbr:"Transformer", full:"Transformer Architecture", zh:"变换器架构", cat:"基础",
   desc:"2017 年 Google 论文《Attention Is All You Need》提出的神经网络结构，靠“注意力机制”并行处理序列，是当今几乎所有大模型的底座。",
   video:"https://www.youtube.com/watch?v=wjZofJX0v4M", wiki:"https://zh.wikipedia.org/wiki/Transformer模型"},

  {abbr:"Attention", full:"Attention Mechanism", zh:"注意力机制", cat:"基础",
   desc:"让模型在处理某个词时，动态地“关注”句子里相关的其他词，从而理解上下文关系。是 Transformer 的核心。",
   video:"https://www.youtube.com/watch?v=eMlx5fFNoYc", wiki:"https://en.wikipedia.org/wiki/Attention_(machine_learning)"},

  {abbr:"Token", full:"Token / Tokenization", zh:"词元 / 分词", cat:"基础",
   desc:"模型处理文本的最小单位，可能是一个词、半个词或一个字。模型按 token 计费和计算长度，“分词”就是把文本切成 token 的过程。",
   video:"https://www.youtube.com/watch?v=zduSFxRajkE", wiki:"https://en.wikipedia.org/wiki/Lexical_analysis#Tokenization"},

  {abbr:"Embedding", full:"Vector Embedding", zh:"向量嵌入", cat:"基础",
   desc:"把词语、句子或图片转成一串数字（向量），让语义相近的内容在向量空间里距离也相近。是语义搜索、RAG 的基础。",
   video:"https://www.youtube.com/watch?v=wgfSDrqYMJ4", wiki:"https://en.wikipedia.org/wiki/Word_embedding"},

  {abbr:"NN", full:"Neural Network", zh:"神经网络", cat:"基础",
   desc:"模仿大脑神经元连接方式的计算模型，由层层相连的“节点”组成，通过调整连接权重来学习数据中的规律。",
   video:"https://www.youtube.com/watch?v=aircAruvnKk", wiki:"https://zh.wikipedia.org/wiki/人工神经网络"},

  {abbr:"Backprop", full:"Backpropagation", zh:"反向传播", cat:"训练",
   desc:"训练神经网络的核心算法：先算出预测误差，再把误差从输出层“倒推”回去，逐层调整每个权重，让下次预测更准。",
   video:"https://www.youtube.com/watch?v=Ilg3gGewQ5U", wiki:"https://zh.wikipedia.org/wiki/反向传播算法"},

  {abbr:"GD", full:"Gradient Descent", zh:"梯度下降", cat:"训练",
   desc:"一种优化方法：把“误差”想象成山谷，沿着最陡的下坡方向一小步一小步走，直到走到谷底（误差最小），从而找到最优参数。",
   video:"https://www.youtube.com/watch?v=IHZwWFHWa-w", wiki:"https://zh.wikipedia.org/wiki/梯度下降法"},

  {abbr:"Fine-tuning", full:"Fine-tuning", zh:"微调", cat:"训练",
   desc:"在已经训练好的大模型基础上，用一小批特定领域的数据继续训练，让它更擅长某个具体任务或风格，成本远低于从头训练。",
   video:"https://www.youtube.com/watch?v=eC6Hd1hFvos", wiki:"https://en.wikipedia.org/wiki/Fine-tuning_(deep_learning)"},

  {abbr:"RLHF", full:"Reinforcement Learning from Human Feedback", zh:"人类反馈强化学习", cat:"训练",
   desc:"用人类对模型回答的好坏评分作为奖励信号，反复训练模型，使其输出更符合人类偏好。是 ChatGPT 变“听话”的关键技术。",
   video:"https://www.youtube.com/watch?v=qV_rOlHjvvs", wiki:"https://en.wikipedia.org/wiki/Reinforcement_learning_from_human_feedback"},

  {abbr:"Pre-training", full:"Pre-training", zh:"预训练", cat:"训练",
   desc:"模型的第一阶段：在海量通用数据上无监督学习，掌握语言/世界的基础知识。之后再通过微调适配具体任务。",
   video:"https://www.youtube.com/watch?v=wjZofJX0v4M", wiki:"https://en.wikipedia.org/wiki/Foundation_model"},

  {abbr:"RAG", full:"Retrieval-Augmented Generation", zh:"检索增强生成", cat:"Agent应用",
   desc:"回答前先去外部知识库（如你的文档）检索相关资料，再让模型基于这些资料作答。能减少“胡编”，让模型用上最新或私有知识。",
   video:"https://www.youtube.com/watch?v=T-D1OfcDW1M", wiki:"https://en.wikipedia.org/wiki/Retrieval-augmented_generation"},

  {abbr:"Prompt", full:"Prompt / Prompt Engineering", zh:"提示词 / 提示工程", cat:"Agent应用",
   desc:"你给模型的输入指令。提示工程就是通过精心设计指令、示例和结构，引导模型给出更准确、更符合预期的输出。",
   video:"https://www.youtube.com/watch?v=dOxUroR57xs", wiki:"https://en.wikipedia.org/wiki/Prompt_engineering"},

  {abbr:"CoT", full:"Chain-of-Thought", zh:"思维链", cat:"Agent应用",
   desc:"让模型在给出答案前先“一步步把推理过程写出来”，能显著提升它在数学、逻辑等复杂问题上的准确率。",
   video:"https://www.youtube.com/watch?v=_5lsmU0pTHc", wiki:"https://en.wikipedia.org/wiki/Prompt_engineering#Chain-of-thought"},

  {abbr:"Agent", full:"AI Agent", zh:"智能体", cat:"Agent应用",
   desc:"能自主规划、调用工具（搜索、代码、API）、分多步完成复杂任务的 AI 系统，而不只是单轮问答。",

  {abbr:"Hallucination", full:"Hallucination", zh:"幻觉", cat:"Agent应用",
   desc:"模型一本正经地编造出看似合理、实则错误或不存在的信息。是当前大模型最需警惕的可靠性问题。",
   video:"https://www.youtube.com/watch?v=cfqtFvWOfg0", wiki:"https://en.wikipedia.org/wiki/Hallucination_(artificial_intelligence)"},

  {abbr:"Context Window", full:"Context Window", zh:"上下文窗口", cat:"Agent应用",
   desc:"模型一次能“看到”和记住的最大文本长度（按 token 算）。超出窗口的早期内容会被遗忘。窗口越大，能处理的文档越长。",
   video:"https://www.youtube.com/watch?v=zduSFxRajkE", wiki:"https://en.wikipedia.org/wiki/Large_language_model#Context_window"},

  {abbr:"Diffusion", full:"Diffusion Model", zh:"扩散模型", cat:"生成",
   desc:"图像生成主流技术（如 Stable Diffusion、Midjourney）：先把图片加噪成雪花点，再训练模型一步步“去噪”还原，从而学会凭文字生成图像。",
   video:"https://www.youtube.com/watch?v=1CIpzeNxIhU", wiki:"https://en.wikipedia.org/wiki/Diffusion_model"},

  {abbr:"GAN", full:"Generative Adversarial Network", zh:"生成对抗网络", cat:"生成",
   desc:"让两个网络对抗：“生成器”造假图，“判别器”辨真假，互相博弈不断进步，最终生成器能造出以假乱真的内容。",
   video:"https://www.youtube.com/watch?v=8L11aMN5KY8", wiki:"https://zh.wikipedia.org/wiki/生成对抗网络"},

  {abbr:"GPT", full:"Generative Pre-trained Transformer", zh:"生成式预训练变换器", cat:"基础",
   desc:"OpenAI 提出的模型家族名，也是“预训练 + Transformer + 生成式”的代表架构。ChatGPT 即基于 GPT 系列。",
   video:"https://www.youtube.com/watch?v=wjZofJX0v4M", wiki:"https://en.wikipedia.org/wiki/Generative_pre-trained_transformer"},

  {abbr:"MoE", full:"Mixture of Experts", zh:"专家混合模型", cat:"基础",
   desc:"把大模型拆成多个“专家”子网络，每次只激活其中少数最相关的专家来处理输入，从而用更低算力跑出更大模型的效果。",
   video:"https://www.youtube.com/watch?v=0U_65fLoTq0", wiki:"https://en.wikipedia.org/wiki/Mixture_of_experts"},

  {abbr:"CNN", full:"Convolutional Neural Network", zh:"卷积神经网络", cat:"经典模型",
   desc:"擅长处理图像的网络结构，用“卷积核”在图片上滑动提取边缘、纹理等局部特征，是计算机视觉的奠基技术。",
   video:"https://www.youtube.com/watch?v=KuXjwB4LzSA", wiki:"https://zh.wikipedia.org/wiki/卷积神经网络"},

  {abbr:"RNN/LSTM", full:"Recurrent Neural Network / Long Short-Term Memory", zh:"循环神经网络 / 长短期记忆", cat:"经典模型",
   desc:"Transformer 出现前处理序列（文本、语音）的主流结构，靠“循环”记住前文。LSTM 加了门控机制，缓解了长序列“遗忘”问题。",
   video:"https://www.youtube.com/watch?v=YCzL96nL7j0", wiki:"https://zh.wikipedia.org/wiki/長短期記憶"},

  {abbr:"Overfitting", full:"Overfitting", zh:"过拟合", cat:"训练",
   desc:"模型把训练数据“背得太死”，连噪声都记住了，导致在新数据上表现很差。就像死记答案的学生遇到新题就不会。",
   video:"https://www.youtube.com/watch?v=EuBBz3bI-aA", wiki:"https://zh.wikipedia.org/wiki/過適"},

  {abbr:"Supervised", full:"Supervised Learning", zh:"监督学习", cat:"训练",
   desc:"用带标准答案（标签）的数据训练模型，让它学会输入到输出的映射，如“这张图是猫”。是最常见的机器学习范式。",
   video:"https://www.youtube.com/watch?v=4qVRBYAdLAo", wiki:"https://zh.wikipedia.org/wiki/監督式學習"},

  {abbr:"Quantization", full:"Quantization", zh:"量化", cat:"推理部署",
   desc:"把模型参数从高精度数字（如 32 位）压缩成低精度（如 4/8 位），大幅减小体积和算力需求，让大模型能跑在手机/笔记本上，代价是轻微精度损失。",
   video:"https://www.youtube.com/watch?v=ZKdMbQq5T30", wiki:"https://en.wikipedia.org/wiki/Quantization_(signal_processing)"},

  {abbr:"Inference", full:"Inference", zh:"推理", cat:"推理部署",
   desc:"指模型“使用”阶段——拿训练好的模型对新输入做预测/生成。区别于“训练”阶段。日常用 ChatGPT 就是在做推理。",
   video:"https://www.youtube.com/watch?v=RwUqsUOZx1c", wiki:"https://en.wikipedia.org/wiki/Inference_engine"},

  {abbr:"Multimodal", full:"Multimodal Model", zh:"多模态模型", cat:"Agent应用",
   desc:"能同时理解和处理多种类型数据（文字、图像、音频、视频）的模型，如能“看图说话”的 GPT-4o、Claude。",
   video:"https://www.youtube.com/watch?v=WqJyrZGdT7Q", wiki:"https://en.wikipedia.org/wiki/Multimodal_learning"},

  /* ===== 以下名词来自「硅谷101」近两三年的芯片/算力/内存/AI 深度内容 ===== */
  {abbr:"HBM", full:"High Bandwidth Memory", zh:"高带宽内存", cat:"硬件算力",
   desc:"把多块 DRAM 内存芯片垂直堆叠、紧贴在 GPU 旁边的高速内存。带宽是普通内存的数倍，是喂饱 AI 芯片、决定大模型训练速度的关键瓶颈。SK海力士、三星、美光三家垄断，目前已到 HBM3e、迈向 HBM4。",
   video:"https://www.youtube.com/@TheValley101/search?query=HBM", wiki:"https://zh.wikipedia.org/wiki/高頻寬記憶體"},

  {abbr:"CoWoS", full:"Chip on Wafer on Substrate", zh:"先进封装（台积电）", cat:"硬件算力",
   desc:"台积电的先进封装技术，把 GPU 芯片和 HBM 内存“拼”在同一块基板上，缩短互联距离、提升带宽。产能严重不足，一度是英伟达 H100/B200 出货的最大卡点。",
   video:"https://www.youtube.com/@TheValley101/search?query=CoWoS+封装", wiki:"https://en.wikipedia.org/wiki/Chip-on-wafer-on-substrate"},

  {abbr:"TSV", full:"Through-Silicon Via", zh:"硅通孔", cat:"硬件算力",
   desc:"在芯片上垂直打孔、用金属填充，实现上下层芯片直接互联的技术。是 HBM 内存“叠罗汉”式堆叠的物理基础。",
   video:"https://www.youtube.com/@TheValley101/search?query=HBM+堆叠", wiki:"https://en.wikipedia.org/wiki/Through-silicon_via"},

  {abbr:"DRAM", full:"Dynamic Random Access Memory", zh:"动态随机存取存储器", cat:"硬件算力",
   desc:"电脑/手机里最主流的“内存”，断电即失、读写极快，用来临时存放正在运行的数据。HBM 就是把 DRAM 堆叠而成的高端形态。",
   video:"https://www.youtube.com/@TheValley101/search?query=内存+DRAM", wiki:"https://zh.wikipedia.org/wiki/動態隨機存取記憶體"},

  {abbr:"KV Cache", full:"Key-Value Cache", zh:"键值缓存", cat:"硬件算力",
   desc:"大模型生成文字时，把已算过的中间结果（注意力的 Key/Value）缓存起来，避免重复计算。能大幅加速推理，但很吃显存——上下文越长，KV Cache 占用越大。",
   video:"https://www.youtube.com/@TheValley101/search?query=推理+缓存", wiki:"https://en.wikipedia.org/wiki/Transformer_(deep_learning_architecture)#KV_caching"},

  {abbr:"TPU", full:"Tensor Processing Unit", zh:"张量处理单元", cat:"硬件算力",
   desc:"谷歌自研的 AI 专用芯片，专为神经网络的矩阵运算优化，是英伟达 GPU 在 AI 算力上的主要挑战者之一。",
   video:"https://www.youtube.com/@TheValley101/search?query=TPU", wiki:"https://zh.wikipedia.org/wiki/張量處理單元"},

  {abbr:"GPU", full:"Graphics Processing Unit", zh:"图形处理器", cat:"硬件算力",
   desc:"原本用于游戏图形渲染，因擅长大规模并行计算而成为 AI 训练的主力芯片。英伟达凭 GPU + CUDA 生态垄断了 AI 算力市场。",
   video:"https://www.youtube.com/@TheValley101/search?query=英伟达+GPU", wiki:"https://zh.wikipedia.org/wiki/圖形處理器"},

  {abbr:"NPU", full:"Neural Processing Unit", zh:"神经网络处理器", cat:"硬件算力",
   desc:"专为 AI 推理优化的处理器，常集成在手机/电脑芯片里（如苹果、高通），让设备能本地、低功耗地跑 AI。",
   video:"https://www.youtube.com/@TheValley101/search?query=端侧+AI+芯片", wiki:"https://en.wikipedia.org/wiki/AI_accelerator"},

  {abbr:"FLOPS", full:"Floating Point Operations Per Second", zh:"每秒浮点运算次数", cat:"硬件算力",
   desc:"衡量算力的核心单位，指芯片每秒能做多少次浮点运算。常见 TFLOPS（万亿次）、PFLOPS（千万亿次），数字越大算力越强。",
   video:"https://www.youtube.com/@TheValley101/search?query=算力", wiki:"https://zh.wikipedia.org/wiki/每秒浮点运算次数"},

  {abbr:"Chiplet", full:"Chiplet", zh:"芯粒", cat:"硬件算力",
   desc:"把一颗大芯片拆成多个小模块（芯粒）分别制造，再封装拼接。能提升良率、降低成本，是绕开制程极限的重要思路。",
   video:"https://www.youtube.com/@TheValley101/search?query=Chiplet+芯片", wiki:"https://en.wikipedia.org/wiki/Chiplet"},

  {abbr:"制程", full:"Process Node", zh:"制程节点", cat:"硬件算力",
   desc:"指芯片制造工艺的精细度，如 7nm、5nm、3nm。数字越小，单位面积塞的晶体管越多、越省电越快。是台积电、英特尔、三星竞争的核心战场。",
   video:"https://www.youtube.com/@TheValley101/search?query=制程+台积电", wiki:"https://zh.wikipedia.org/wiki/半導體製程"},

  {abbr:"Scaling Law", full:"Scaling Law", zh:"规模定律", cat:"前沿",
   desc:"经验规律：模型能力会随着参数量、数据量、算力的增加而可预测地提升。这是各大公司不计成本堆算力、堆数据的理论依据。",
   video:"https://www.youtube.com/@TheValley101/search?query=Scaling+Law+大模型", wiki:"https://en.wikipedia.org/wiki/Neural_scaling_law"},

  {abbr:"Distillation", full:"Knowledge Distillation", zh:"知识蒸馏", cat:"训练",
   desc:"用一个庞大的“教师模型”来训练一个小巧的“学生模型”，把大模型的能力“浓缩”进小模型，从而在低成本下保留大部分性能。",
   video:"https://www.youtube.com/@TheValley101/search?query=蒸馏+小模型", wiki:"https://en.wikipedia.org/wiki/Knowledge_distillation"},

  {abbr:"LoRA", full:"Low-Rank Adaptation", zh:"低秩适配", cat:"训练",
   desc:"一种高效微调方法：冻结原模型，只额外训练一小撮新增参数，就能让大模型适配新任务。省显存、省成本，是定制化模型的主流手段。",
   video:"https://www.youtube.com/@TheValley101/search?query=微调+LoRA", wiki:"https://en.wikipedia.org/wiki/Fine-tuning_(deep_learning)#Low-rank_adaptation"},

  {abbr:"Foundation Model", full:"Foundation Model", zh:"基础模型", cat:"基础",
   desc:"在超大规模数据上预训练、可适配下游各种任务的通用大模型（如 GPT、Claude、Gemini）。是上层无数 AI 应用的“地基”。",
   video:"https://www.youtube.com/@TheValley101/search?query=基础模型+大模型", wiki:"https://en.wikipedia.org/wiki/Foundation_model"},

  {abbr:"具身智能", full:"Embodied AI / Embodied Intelligence", zh:"具身智能", cat:"前沿",
   desc:"让 AI 拥有“身体”（机器人本体），通过与物理世界交互来感知和行动，而不只是在屏幕里对话。被视为通往通用人工智能的关键路径。",
   video:"https://www.youtube.com/@TheValley101/search?query=具身智能+机器人", wiki:"https://en.wikipedia.org/wiki/Embodied_cognition"},

  {abbr:"VLA", full:"Vision-Language-Action Model", zh:"视觉-语言-动作模型", cat:"前沿",
   desc:"机器人领域的大模型架构：输入摄像头画面（视觉）和指令（语言），直接输出机器人的动作。被称为机器人的“GPT 时刻”。",
   video:"https://www.youtube.com/@TheValley101/search?query=VLA+具身", wiki:"https://en.wikipedia.org/wiki/Vision-language-action_model"},

  {abbr:"World Model", full:"World Model", zh:"世界模型", cat:"前沿",
   desc:"让 AI 在内部建立一个对物理世界运行规律的“模拟器”，从而能预测“如果这样做会发生什么”，再据此规划行动。是机器人、自动驾驶的核心方向。",
   video:"https://www.youtube.com/@TheValley101/search?query=世界模型", wiki:"https://en.wikipedia.org/wiki/World_model"},

  {abbr:"FDE", full:"Forward Deployed Engineer", zh:"前向部署工程师", cat:"前沿",
   desc:"驻扎在客户现场、把 AI 产品真正落地到客户业务里的工程师岗位。随着 AI 商业化，成为硅谷最火的新职位之一（源自 Palantir）。",
   video:"https://www.youtube.com/@TheValley101/search?query=FDE+工程师", wiki:"https://en.wikipedia.org/wiki/Palantir_Technologies"},

  /* ===== 公司 / 模型 / 产品：名字由来 + 公司是干什么的 ===== */
  {abbr:"GPT", full:"Generative Pre-trained Transformer", zh:"OpenAI 的模型家族", cat:"模型产品",
   desc:"名字直译为“生成式·预训练·变换器”，三个词正好是它的三大技术支柱。ChatGPT = Chat（聊天）+ GPT。2026 年主力是 GPT-5 系列（如 GPT-5.5）；其中 GPT-4o 的“o”是 omni（全能），代表能同时处理文字/图像/语音的多模态能力。",
   video:"https://www.youtube.com/@TheValley101/search?query=GPT+OpenAI", wiki:"https://en.wikipedia.org/wiki/Generative_pre-trained_transformer"},

  {abbr:"Claude", full:"Claude (by Anthropic)", zh:"Anthropic 的模型家族", cat:"模型产品",
   desc:"名字致敬“信息论之父”克劳德·香农（Claude Shannon）。所有型号名都取自“由短到长”的文学/音乐体裁，用体裁的“体量”隐喻模型档位，能力从低到高排成一条阶梯：Haiku（俳句）→ Sonnet（十四行诗）→ Opus（作品）→ Mythos（神话）→ Fable（寓言）。每个名字的具体来历见下面各自的词条。",
   video:"https://www.youtube.com/@TheValley101/search?query=Claude+Anthropic", wiki:"https://en.wikipedia.org/wiki/Claude_(language_model)"},

  {abbr:"Claude Code", full:"Claude Code", zh:"Anthropic 的 AI 编程工具", cat:"模型产品",
   desc:"Anthropic 出的命令行 AI 编程助手（agent），能读写代码、跑命令、自主完成开发任务。它背后调用的就是 Claude 模型——你可以切换用 Opus（最强）、Sonnet（均衡）、Haiku（快）等不同档位来干活。",
   video:"https://www.youtube.com/@TheValley101/search?query=Claude+Code+编程", wiki:"https://www.anthropic.com/claude-code"},

  {abbr:"Gemini", full:"Google Gemini", zh:"谷歌的模型家族", cat:"模型产品",
   desc:"Gemini 是拉丁语“双子座”。一层含义是谷歌两大 AI 团队 Google Brain 与 DeepMind 合并“合体”；另一层是它原生多模态、文字与图像“双生”。由 Google DeepMind 开发。",
   video:"https://www.youtube.com/@TheValley101/search?query=谷歌+Gemini", wiki:"https://en.wikipedia.org/wiki/Gemini_(language_model)"},

  {abbr:"Llama", full:"Large Language Model Meta AI", zh:"Meta 的开源模型", cat:"模型产品",
   desc:"名字其实是“Large Language Model Meta AI”的缩写（顺便和草泥马 llama 同名）。Meta（脸书母公司）出品，是“开源/开放权重”大模型的代表，催生了海量社区微调模型。",
   video:"https://www.youtube.com/@TheValley101/search?query=Llama+开源+Meta", wiki:"https://en.wikipedia.org/wiki/Llama_(language_model)"},

  {abbr:"Grok", full:"Grok (by xAI)", zh:"马斯克 xAI 的模型", cat:"模型产品",
   desc:"“grok”一词出自海因莱因 1961 年科幻小说《异乡异客》，火星语意为“彻底理解、融会贯通到成为自身的一部分”。马斯克用它命名，寓意要造出真正“看懂世界”的 AI。",
   video:"https://www.youtube.com/@TheValley101/search?query=马斯克+Grok+xAI", wiki:"https://en.wikipedia.org/wiki/Grok_(chatbot)"},

  {abbr:"Qwen", full:"Qwen / 通义千问", zh:"阿里巴巴的大模型", cat:"模型产品",
   desc:"阿里巴巴自研的大模型家族，中文名“通义千问”。开源版本在全球社区影响力很大，是中国大模型的代表之一。",
   video:"https://www.youtube.com/@TheValley101/search?query=通义千问+阿里", wiki:"https://en.wikipedia.org/wiki/Qwen"},

  {abbr:"OpenAI", full:"OpenAI", zh:"ChatGPT 背后的公司", cat:"公司机构",
   desc:"2015 年成立，使命是“安全地实现通用人工智能（AGI）”。代表产品：ChatGPT、GPT 系列、视频模型 Sora、编程工具 Codex。微软是其主要投资方与云合作伙伴。名字里的“Open”原指开放，但如今旗舰模型多为闭源。",
   video:"https://www.youtube.com/@TheValley101/search?query=OpenAI", wiki:"https://en.wikipedia.org/wiki/OpenAI"},

  {abbr:"Anthropic", full:"Anthropic", zh:"Claude 背后的公司", cat:"公司机构",
   desc:"2021 年由一批前 OpenAI 核心成员（Dario、Daniela Amodei 等）创立，主打“AI 安全”，提出“宪法 AI”理念。产品：Claude、Claude Code。亚马逊、谷歌是主要投资方。“anthropic”意为“与人类相关的”。",
   video:"https://www.youtube.com/@TheValley101/search?query=Anthropic+Claude", wiki:"https://en.wikipedia.org/wiki/Anthropic"},

  {abbr:"Nvidia", full:"NVIDIA / 英伟达", zh:"AI 算力霸主", cat:"公司机构",
   desc:"全球 AI 算力的绝对核心。靠 GPU（如 H100、B200、GB200）加上 CUDA 软件生态垄断了大模型训练市场，一度成为全球市值最高的公司之一。它只设计芯片，制造交给台积电。",
   video:"https://www.youtube.com/@TheValley101/search?query=英伟达+Nvidia", wiki:"https://zh.wikipedia.org/wiki/輝達"},

  {abbr:"TSMC", full:"Taiwan Semiconductor / 台积电", zh:"全球最大芯片代工厂", cat:"公司机构",
   desc:"全球最大的晶圆代工厂。英伟达、苹果、AMD 的先进芯片几乎都由它制造，先进封装 CoWoS 也是它的拿手技术。是整个 AI 硬件链的咽喉之一。",
   video:"https://www.youtube.com/@TheValley101/search?query=台积电+TSMC", wiki:"https://zh.wikipedia.org/wiki/台積電"},

  {abbr:"SK Hynix", full:"SK Hynix / SK海力士", zh:"HBM 内存龙头", cat:"公司机构",
   desc:"韩国存储芯片巨头，主营 DRAM 内存与 NAND 闪存。最关键的身份是全球 HBM（高带宽内存）市场龙头，是英伟达 AI 芯片的 HBM 主力供应商——与英伟达、台积电深度绑定。主要竞争对手是三星和美光。",
   video:"https://www.youtube.com/@TheValley101/search?query=海力士+HBM", wiki:"https://zh.wikipedia.org/wiki/SK海力士"},

  {abbr:"Samsung / Micron", full:"Samsung / Micron", zh:"另两大存储巨头", cat:"公司机构",
   desc:"三星（韩国）与美光（美国）是和 SK海力士并列的存储三巨头，同样生产 DRAM、HBM 与闪存，共同主导着 AI 时代紧俏的内存供应。",
   video:"https://www.youtube.com/@TheValley101/search?query=三星+美光+存储", wiki:"https://en.wikipedia.org/wiki/High_Bandwidth_Memory"},

  {abbr:"ASML", full:"ASML / 阿斯麦", zh:"光刻机垄断者", cat:"公司机构",
   desc:"荷兰公司，全球唯一能造出 EUV（极紫外）光刻机的厂商。没有它的设备，就造不出最先进制程的芯片，因此是全球半导体产业链的“总开关”。",
   video:"https://www.youtube.com/@TheValley101/search?query=ASML+光刻机", wiki:"https://zh.wikipedia.org/wiki/ASML"},

  {abbr:"Hugging Face", full:"Hugging Face", zh:"AI 界的 GitHub", cat:"公司机构",
   desc:"开源 AI 社区与平台，托管了几十万个模型和数据集，开发者可以一键下载、分享、部署模型，被称为“AI 界的 GitHub”。logo 就是那个抱抱脸 🤗 表情。",
   video:"https://www.youtube.com/@TheValley101/search?query=Hugging+Face+开源模型", wiki:"https://en.wikipedia.org/wiki/Hugging_Face"},

  {abbr:"OpenRouter", full:"OpenRouter", zh:"大模型聚合平台", cat:"公司机构",
   desc:"模型聚合平台（API 网关）：用一个统一接口就能调用 OpenAI、Anthropic、Google 等几百个模型，自动帮你路由、比价、容灾。想横向对比或随时切换模型时特别方便。",
   video:"https://www.youtube.com/@TheValley101/search?query=大模型+API+聚合", wiki:"https://openrouter.ai/"},

  {abbr:"DeepSeek", full:"DeepSeek / 深度求索", zh:"中国开源大模型黑马", cat:"公司机构",
   desc:"中国大模型公司，背靠量化基金幻方。以极低的训练成本做出高性能、开源的模型，一度震动全球业界，是中国 AI 的代表之一。",
   video:"https://www.youtube.com/@TheValley101/search?query=DeepSeek+深度求索", wiki:"https://en.wikipedia.org/wiki/DeepSeek"},

  {abbr:"Mistral AI", full:"Mistral AI", zh:"欧洲开源大模型代表", cat:"公司机构",
   desc:"法国大模型公司，欧洲 AI 的旗帜，主打开源与高效模型。名字取自法国南部地中海沿岸的强风“密史脱拉风（Mistral）”。",
   video:"https://www.youtube.com/@TheValley101/search?query=Mistral+欧洲+大模型", wiki:"https://en.wikipedia.org/wiki/Mistral_AI"},

  {abbr:"Cursor", full:"Cursor (by Anysphere)", zh:"爆火的 AI 编程工具", cat:"公司机构",
   desc:"基于大模型的 AI 代码编辑器/编程 agent，能理解整个代码库、自动补全和改写代码，是这两年增长最快的 AI 应用之一。和 Claude Code 同属“AI 编程助手”赛道。",
   video:"https://www.youtube.com/@TheValley101/search?query=Cursor+AI+编程", wiki:"https://en.wikipedia.org/wiki/Cursor_(code_editor)"},

  /* ===== 工程/产品落地词条（大批扩充）===== */

  /* —— 架构 / 基础概念 —— */
  {abbr:"AI", full:"Artificial Intelligence", zh:"人工智能", cat:"基础",
   desc:"让机器模拟人类智能（学习、推理、感知）的总领域，机器学习和深度学习都是它的子集。",
   video:"https://www.youtube.com/results?search_query=人工智能+是什么", wiki:"https://zh.wikipedia.org/wiki/人工智能"},
  {abbr:"ML", full:"Machine Learning", zh:"机器学习", cat:"基础",
   desc:"让计算机从数据中自动学习规律、而非靠人写死规则的方法，是现代 AI 的核心。",
   video:"https://www.youtube.com/results?search_query=机器学习+入门", wiki:"https://zh.wikipedia.org/wiki/机器学习"},
  {abbr:"DL", full:"Deep Learning", zh:"深度学习", cat:"基础",
   desc:"用多层神经网络（“深”指层数多）自动从海量数据中学特征的机器学习分支，是大模型的技术根基。",
   video:"https://www.youtube.com/results?search_query=深度学习+入门", wiki:"https://zh.wikipedia.org/wiki/深度学习"},
  {abbr:"Self-Attention", full:"Self-Attention", zh:"自注意力", cat:"基础",
   desc:"句子里每个词都去“打量”同句其他所有词、算出关联权重，从而理解上下文。Transformer 的核心机制。",
   video:"https://www.youtube.com/results?search_query=self+attention+explained", wiki:"https://en.wikipedia.org/wiki/Attention_(machine_learning)"},
  {abbr:"Multi-Head Attention", full:"Multi-Head Attention", zh:"多头注意力", cat:"基础",
   desc:"同时跑多组注意力（多个“头”），让模型从不同角度并行捕捉词与词的关系，再汇总。",
   video:"https://www.youtube.com/results?search_query=multi+head+attention", wiki:"https://en.wikipedia.org/wiki/Transformer_(deep_learning_architecture)"},
  {abbr:"Positional Encoding", full:"Positional Encoding", zh:"位置编码", cat:"基础",
   desc:"Transformer 本身不分先后顺序，靠位置编码给每个词加上“它在第几位”的信息，让模型理解词序。",
   video:"https://www.youtube.com/results?search_query=positional+encoding+transformer", wiki:"https://en.wikipedia.org/wiki/Transformer_(deep_learning_architecture)"},
  {abbr:"RoPE", full:"Rotary Position Embedding", zh:"旋转位置编码", cat:"基础",
   desc:"一种主流位置编码方式，用旋转向量的方式注入位置信息，能更好地支持超长上下文，被多数现代大模型采用。",
   video:"https://www.youtube.com/results?search_query=rotary+position+embedding+RoPE", wiki:"https://en.wikipedia.org/wiki/Rotary_position_embedding"},
  {abbr:"Encoder / Decoder", full:"Encoder / Decoder", zh:"编码器 / 解码器", cat:"基础",
   desc:"编码器把输入“读懂”成内部表示，解码器据此“生成”输出。翻译模型常两者都用，GPT 类则只用解码器。",
   video:"https://www.youtube.com/results?search_query=encoder+decoder+transformer", wiki:"https://en.wikipedia.org/wiki/Transformer_(deep_learning_architecture)"},
  {abbr:"Autoregressive", full:"Autoregressive Model", zh:"自回归", cat:"基础",
   desc:"一个词一个词地生成、每次都把已生成内容当输入预测下一个词。GPT 类大模型的工作方式。",
   video:"https://www.youtube.com/results?search_query=autoregressive+language+model", wiki:"https://en.wikipedia.org/wiki/Autoregressive_model"},
  {abbr:"Parameters", full:"Parameters", zh:"参数（量）", cat:"基础",
   desc:"模型内部可学习的数值（权重），数量常以 B（十亿）计。参数越多、容量越大，但也越吃算力，如“70B 模型”。",
   video:"https://www.youtube.com/results?search_query=model+parameters+billion+explained", wiki:"https://en.wikipedia.org/wiki/Large_language_model"},
  {abbr:"Latent Space", full:"Latent Space", zh:"潜空间", cat:"基础",
   desc:"模型把数据压缩成的高维“语义空间”，相近含义的内容在其中位置也相近。生成模型就在这个空间里操作。",
   video:"https://www.youtube.com/results?search_query=latent+space+explained", wiki:"https://en.wikipedia.org/wiki/Latent_space"},
  {abbr:"MLP", full:"Multi-Layer Perceptron", zh:"多层感知机", cat:"基础",
   desc:"最基础的全连接神经网络结构，由输入层、隐藏层、输出层堆叠而成，是更复杂网络的基本积木。",
   video:"https://www.youtube.com/results?search_query=multilayer+perceptron", wiki:"https://en.wikipedia.org/wiki/Multilayer_perceptron"},
  {abbr:"BERT", full:"Bidirectional Encoder Representations from Transformers", zh:"双向编码器表示模型", cat:"经典模型",
   desc:"谷歌 2018 年提出的双向语言理解模型，擅长分类、搜索等理解类任务，开启了预训练时代，与生成式的 GPT 互为代表。",
   video:"https://www.youtube.com/results?search_query=BERT+model+explained", wiki:"https://en.wikipedia.org/wiki/BERT_(language_model)"},
  {abbr:"Seq2Seq", full:"Sequence-to-Sequence", zh:"序列到序列", cat:"经典模型",
   desc:"输入一个序列、输出另一个序列的模型范式（如翻译、摘要），是 Transformer 之前机器翻译的主流框架。",
   video:"https://www.youtube.com/results?search_query=seq2seq+model", wiki:"https://en.wikipedia.org/wiki/Seq2seq"},
  {abbr:"Tokenizer", full:"Tokenizer", zh:"分词器", cat:"基础",
   desc:"把文本切成 token 的工具/算法，决定了模型如何“看见”文字。常用 BPE 等子词切分法。",
   video:"https://www.youtube.com/results?search_query=tokenizer+LLM+BPE", wiki:"https://en.wikipedia.org/wiki/Byte_pair_encoding"},
  {abbr:"BPE", full:"Byte Pair Encoding", zh:"字节对编码", cat:"基础",
   desc:"主流分词算法：把高频字符组合合并成一个 token，平衡“词表大小”与“覆盖率”，几乎所有大模型都在用。",
   video:"https://www.youtube.com/results?search_query=byte+pair+encoding", wiki:"https://en.wikipedia.org/wiki/Byte_pair_encoding"},
  {abbr:"Logits", full:"Logits", zh:"对数几率", cat:"基础",
   desc:"模型在输出每个候选 token 前算出的原始分数，经 Softmax 转成概率后再采样。",
   video:"https://www.youtube.com/results?search_query=logits+softmax+neural+network", wiki:"https://en.wikipedia.org/wiki/Logit"},

  /* —— 训练 / 算法 —— */
  {abbr:"SFT", full:"Supervised Fine-Tuning", zh:"监督微调", cat:"训练",
   desc:"用人工写好的“问题—优质回答”样本微调预训练模型，让它学会按指令作答。是 RLHF 之前的关键一步。",
   video:"https://www.youtube.com/results?search_query=supervised+fine+tuning+LLM", wiki:"https://en.wikipedia.org/wiki/Fine-tuning_(deep_learning)"},
  {abbr:"DPO", full:"Direct Preference Optimization", zh:"直接偏好优化", cat:"训练",
   desc:"对齐大模型的新方法：直接用“好回答优于坏回答”的偏好数据训练，省去 RLHF 里复杂的奖励模型，更简单稳定。",
   video:"https://www.youtube.com/results?search_query=direct+preference+optimization+DPO", wiki:"https://en.wikipedia.org/wiki/Direct_preference_optimization"},
  {abbr:"PPO", full:"Proximal Policy Optimization", zh:"近端策略优化", cat:"训练",
   desc:"一种强化学习算法，是经典 RLHF 流程中用来根据奖励信号更新模型的核心方法。",
   video:"https://www.youtube.com/results?search_query=proximal+policy+optimization", wiki:"https://en.wikipedia.org/wiki/Proximal_policy_optimization"},
  {abbr:"Reward Model", full:"Reward Model", zh:"奖励模型", cat:"训练",
   desc:"专门学习“人类觉得哪个回答更好”的模型，给主模型的输出打分，是 RLHF 的“裁判”。",
   video:"https://www.youtube.com/results?search_query=reward+model+RLHF", wiki:"https://en.wikipedia.org/wiki/Reinforcement_learning_from_human_feedback"},
  {abbr:"Constitutional AI", full:"Constitutional AI", zh:"宪法 AI", cat:"训练",
   desc:"Anthropic 提出的对齐方法：给模型一套书面“原则（宪法）”，让它据此自我批评和改进，减少对大量人工标注的依赖。",
   video:"https://www.youtube.com/results?search_query=constitutional+AI+anthropic", wiki:"https://en.wikipedia.org/wiki/Constitutional_AI"},
  {abbr:"RL", full:"Reinforcement Learning", zh:"强化学习", cat:"训练",
   desc:"让智能体通过“试错—获得奖励/惩罚”来学习最优策略，像训练宠物。是 AlphaGo 和 RLHF 的底层范式。",
   video:"https://www.youtube.com/results?search_query=reinforcement+learning+explained", wiki:"https://zh.wikipedia.org/wiki/强化学习"},
  {abbr:"Self-Supervised", full:"Self-Supervised Learning", zh:"自监督学习", cat:"训练",
   desc:"不需人工标注，让模型从数据本身构造任务（如“遮住一个词让它猜”）来学习。大模型预训练的核心方式。",
   video:"https://www.youtube.com/results?search_query=self+supervised+learning", wiki:"https://en.wikipedia.org/wiki/Self-supervised_learning"},
  {abbr:"Unsupervised", full:"Unsupervised Learning", zh:"无监督学习", cat:"训练",
   desc:"用没有标签的数据，让模型自己发现结构和规律（如聚类）。与监督学习相对。",
   video:"https://www.youtube.com/results?search_query=unsupervised+learning", wiki:"https://zh.wikipedia.org/wiki/无监督学习"},
  {abbr:"Transfer Learning", full:"Transfer Learning", zh:"迁移学习", cat:"训练",
   desc:"把在一个任务上学到的知识迁移到另一个相关任务，省时省数据。“预训练+微调”就是它的典型应用。",
   video:"https://www.youtube.com/results?search_query=transfer+learning", wiki:"https://zh.wikipedia.org/wiki/迁移学习"},
  {abbr:"Loss Function", full:"Loss Function", zh:"损失函数", cat:"训练",
   desc:"衡量模型预测与正确答案差距的函数，训练的目标就是让这个“损失”尽量小。",
   video:"https://www.youtube.com/results?search_query=loss+function+machine+learning", wiki:"https://en.wikipedia.org/wiki/Loss_function"},
  {abbr:"Cross-Entropy", full:"Cross-Entropy Loss", zh:"交叉熵损失", cat:"训练",
   desc:"分类和语言模型最常用的损失函数，衡量预测概率分布与真实分布的差距。",
   video:"https://www.youtube.com/results?search_query=cross+entropy+loss", wiki:"https://en.wikipedia.org/wiki/Cross-entropy"},
  {abbr:"Perplexity", full:"Perplexity", zh:"困惑度", cat:"评估安全",
   desc:"衡量语言模型“预测下一个词有多不确定”的指标，越低代表模型对语言把握得越好。",
   video:"https://www.youtube.com/results?search_query=perplexity+language+model", wiki:"https://en.wikipedia.org/wiki/Perplexity"},
  {abbr:"Learning Rate", full:"Learning Rate", zh:"学习率", cat:"训练",
   desc:"每次参数更新“迈多大步”的超参数。太大易震荡发散，太小则训练慢，是最关键的调参之一。",
   video:"https://www.youtube.com/results?search_query=learning+rate+deep+learning", wiki:"https://en.wikipedia.org/wiki/Learning_rate"},
  {abbr:"Batch Size", full:"Batch Size", zh:"批大小", cat:"训练",
   desc:"每次更新参数时一起喂给模型的样本数量。影响训练速度、显存占用和稳定性。",
   video:"https://www.youtube.com/results?search_query=batch+size+training", wiki:"https://en.wikipedia.org/wiki/Stochastic_gradient_descent"},
  {abbr:"Epoch", full:"Epoch", zh:"训练轮次", cat:"训练",
   desc:"把整个训练数据集完整过一遍叫一个 epoch。通常要训练多个 epoch。",
   video:"https://www.youtube.com/results?search_query=epoch+batch+iteration", wiki:"https://en.wikipedia.org/wiki/Epoch_(machine_learning)"},
  {abbr:"Optimizer", full:"Optimizer", zh:"优化器", cat:"训练",
   desc:"决定如何根据梯度更新参数的算法，如 SGD、Adam。好的优化器能让训练更快更稳。",
   video:"https://www.youtube.com/results?search_query=optimizer+adam+sgd", wiki:"https://en.wikipedia.org/wiki/Stochastic_gradient_descent"},
  {abbr:"Adam / AdamW", full:"Adaptive Moment Estimation", zh:"自适应矩估计优化器", cat:"训练",
   desc:"目前最常用的优化器，能为每个参数自适应调整学习率。AdamW 是其改进版，几乎是训练大模型的默认选择。",
   video:"https://www.youtube.com/results?search_query=adam+optimizer+explained", wiki:"https://en.wikipedia.org/wiki/Stochastic_gradient_descent#Adam"},
  {abbr:"Dropout", full:"Dropout", zh:"随机失活", cat:"训练",
   desc:"训练时随机“关掉”一部分神经元，强迫网络不过度依赖某些节点，是防止过拟合的经典手段。",
   video:"https://www.youtube.com/results?search_query=dropout+neural+network", wiki:"https://en.wikipedia.org/wiki/Dropout_(neural_networks)"},
  {abbr:"Regularization", full:"Regularization", zh:"正则化", cat:"训练",
   desc:"给训练加“约束”以防止模型过拟合的一类技术总称，如 L2 正则、Dropout 等。",
   video:"https://www.youtube.com/results?search_query=regularization+machine+learning", wiki:"https://en.wikipedia.org/wiki/Regularization_(mathematics)"},
  {abbr:"Underfitting", full:"Underfitting", zh:"欠拟合", cat:"训练",
   desc:"模型太简单、没学够，连训练数据都拟合不好。与过拟合相对。",
   video:"https://www.youtube.com/results?search_query=underfitting+overfitting", wiki:"https://en.wikipedia.org/wiki/Overfitting"},
  {abbr:"Hyperparameter", full:"Hyperparameter", zh:"超参数", cat:"训练",
   desc:"训练前需人为设定、不由模型自己学的配置，如学习率、批大小、层数。调它们叫“调参”。",
   video:"https://www.youtube.com/results?search_query=hyperparameter+tuning", wiki:"https://en.wikipedia.org/wiki/Hyperparameter_(machine_learning)"},
  {abbr:"Activation Function", full:"Activation Function", zh:"激活函数", cat:"训练",
   desc:"给神经网络引入非线性的函数（如 ReLU），没有它网络只能拟合直线、无法学复杂规律。",
   video:"https://www.youtube.com/results?search_query=activation+function+relu+gelu", wiki:"https://en.wikipedia.org/wiki/Activation_function"},
  {abbr:"Softmax", full:"Softmax", zh:"归一化指数函数", cat:"训练",
   desc:"把一组分数转换成加起来为 1 的概率分布，常用于模型输出层，决定“选哪个词/类别”。",
   video:"https://www.youtube.com/results?search_query=softmax+function", wiki:"https://en.wikipedia.org/wiki/Softmax_function"},
  {abbr:"Layer Norm", full:"Layer Normalization", zh:"层归一化", cat:"训练",
   desc:"对每层的输出做标准化，稳定数值、加速收敛，是 Transformer 里不可或缺的组件。",
   video:"https://www.youtube.com/results?search_query=layer+normalization", wiki:"https://en.wikipedia.org/wiki/Normalization_(machine_learning)"},
  {abbr:"Residual Connection", full:"Residual Connection", zh:"残差连接", cat:"训练",
   desc:"让输入“抄近路”直接加到输出上（跳跃连接），缓解深层网络梯度消失，使训练上百层成为可能。",
   video:"https://www.youtube.com/results?search_query=residual+connection+resnet", wiki:"https://en.wikipedia.org/wiki/Residual_neural_network"},
  {abbr:"QLoRA", full:"Quantized Low-Rank Adaptation", zh:"量化低秩微调", cat:"训练",
   desc:"LoRA 的省显存升级版：先把模型量化压缩，再做 LoRA 微调，让在单张消费级显卡上微调大模型成为可能。",
   video:"https://www.youtube.com/results?search_query=QLoRA+fine+tuning", wiki:"https://en.wikipedia.org/wiki/Fine-tuning_(deep_learning)"},
  {abbr:"PEFT", full:"Parameter-Efficient Fine-Tuning", zh:"参数高效微调", cat:"训练",
   desc:"只训练少量额外参数就能微调大模型的一类方法总称，LoRA、QLoRA 都属于它，目标是省钱省显存。",
   video:"https://www.youtube.com/results?search_query=parameter+efficient+fine+tuning", wiki:"https://en.wikipedia.org/wiki/Fine-tuning_(deep_learning)"},
  {abbr:"Catastrophic Forgetting", full:"Catastrophic Forgetting", zh:"灾难性遗忘", cat:"训练",
   desc:"模型在学新任务时把旧任务的能力忘掉的现象，是持续学习和微调时要小心的问题。",
   video:"https://www.youtube.com/results?search_query=catastrophic+forgetting", wiki:"https://en.wikipedia.org/wiki/Catastrophic_interference"},
  {abbr:"Synthetic Data", full:"Synthetic Data", zh:"合成数据", cat:"训练",
   desc:"由 AI 自己生成（而非真实采集）的训练数据。在真实数据枯竭的当下，越来越重要。",
   video:"https://www.youtube.com/results?search_query=synthetic+data+LLM+training", wiki:"https://en.wikipedia.org/wiki/Synthetic_data"},

  /* —— 推理 / 部署 / 服务 —— */
  {abbr:"vLLM", full:"vLLM", zh:"高吞吐推理引擎", cat:"推理部署",
   desc:"流行的开源大模型推理框架，靠 PagedAttention 等技术大幅提升吞吐、降低显存浪费，是部署模型服务的常用利器。",
   video:"https://www.youtube.com/results?search_query=vLLM+inference", wiki:"https://en.wikipedia.org/wiki/VLLM"},
  {abbr:"PagedAttention", full:"PagedAttention", zh:"分页注意力", cat:"推理部署",
   desc:"借鉴操作系统“内存分页”思路管理 KV Cache，减少显存碎片浪费，是 vLLM 高效的关键技术。",
   video:"https://www.youtube.com/results?search_query=pagedattention+vllm", wiki:"https://en.wikipedia.org/wiki/VLLM"},
  {abbr:"Flash Attention", full:"Flash Attention", zh:"闪电注意力", cat:"推理部署",
   desc:"一种高效计算注意力的算法，通过优化显存读写大幅加速训练和推理、并省显存，已成行业标配。",
   video:"https://www.youtube.com/results?search_query=flash+attention", wiki:"https://en.wikipedia.org/wiki/Attention_(machine_learning)"},
  {abbr:"Continuous Batching", full:"Continuous Batching", zh:"连续批处理", cat:"推理部署",
   desc:"推理时动态地把不同用户的请求拼成一批一起算，谁先生成完就先返回，大幅提升 GPU 利用率和吞吐。",
   video:"https://www.youtube.com/results?search_query=continuous+batching+LLM", wiki:"https://en.wikipedia.org/wiki/VLLM"},
  {abbr:"Speculative Decoding", full:"Speculative Decoding", zh:"投机解码", cat:"推理部署",
   desc:"让一个小模型先“抢答”几个词，大模型一次性批量验证，验对就直接采用，从而加速生成。",
   video:"https://www.youtube.com/results?search_query=speculative+decoding", wiki:"https://en.wikipedia.org/wiki/Large_language_model"},
  {abbr:"Tensor Parallelism", full:"Tensor Parallelism", zh:"张量并行", cat:"推理部署",
   desc:"把一层的矩阵运算横切，分到多张 GPU 上同时算，用于单卡装不下的大模型。",
   video:"https://www.youtube.com/results?search_query=tensor+parallelism", wiki:"https://en.wikipedia.org/wiki/Data_parallelism"},
  {abbr:"Pipeline Parallelism", full:"Pipeline Parallelism", zh:"流水线并行", cat:"推理部署",
   desc:"把模型按层切成几段，分别放在不同 GPU 上像流水线一样接力计算。",
   video:"https://www.youtube.com/results?search_query=pipeline+parallelism+deep+learning", wiki:"https://en.wikipedia.org/wiki/Data_parallelism"},
  {abbr:"Data Parallelism", full:"Data Parallelism", zh:"数据并行", cat:"推理部署",
   desc:"每张 GPU 存一份完整模型、各算一批不同数据，再同步梯度。最常见的分布式训练方式。",
   video:"https://www.youtube.com/results?search_query=data+parallelism+training", wiki:"https://en.wikipedia.org/wiki/Data_parallelism"},
  {abbr:"ZeRO / FSDP", full:"Zero Redundancy Optimizer / Fully Sharded Data Parallel", zh:"显存分片并行", cat:"推理部署",
   desc:"把模型参数、梯度、优化器状态切片分散到多卡，消除冗余存储，让训练超大模型成为可能（DeepSpeed / PyTorch 的核心技术）。",
   video:"https://www.youtube.com/results?search_query=ZeRO+FSDP+training", wiki:"https://en.wikipedia.org/wiki/DeepSpeed"},
  {abbr:"DeepSpeed", full:"DeepSpeed", zh:"微软大模型训练库", cat:"推理部署",
   desc:"微软开源的深度学习优化库，提供 ZeRO 等显存优化技术，是训练超大模型的常用框架。",
   video:"https://www.youtube.com/results?search_query=deepspeed+microsoft", wiki:"https://en.wikipedia.org/wiki/DeepSpeed"},
  {abbr:"Gradient Checkpointing", full:"Gradient Checkpointing", zh:"梯度检查点", cat:"推理部署",
   desc:"训练时只保存部分中间结果、需要时再重算，用“多算一点”换“省大量显存”。",
   video:"https://www.youtube.com/results?search_query=gradient+checkpointing", wiki:"https://en.wikipedia.org/wiki/Automatic_differentiation"},
  {abbr:"Mixed Precision", full:"Mixed Precision Training", zh:"混合精度训练", cat:"推理部署",
   desc:"训练时混用低精度（FP16/BF16）和高精度数字，加速计算、省显存，同时保持稳定。",
   video:"https://www.youtube.com/results?search_query=mixed+precision+training", wiki:"https://en.wikipedia.org/wiki/Mixed-precision_arithmetic"},
  {abbr:"BF16 / FP16", full:"Brain Float 16 / Float 16", zh:"半精度浮点", cat:"推理部署",
   desc:"用 16 位表示一个数（普通是 32 位），减半显存和带宽需求。BF16 范围更大、训练更稳，是大模型常用格式。",
   video:"https://www.youtube.com/results?search_query=bf16+fp16+deep+learning", wiki:"https://en.wikipedia.org/wiki/Bfloat16_floating-point_format"},
  {abbr:"FP8", full:"Float 8", zh:"8 位浮点", cat:"推理部署",
   desc:"更激进的 8 位浮点格式，进一步省算力和显存，是英伟达新一代芯片（Hopper/Blackwell）训练提速的关键。",
   video:"https://www.youtube.com/results?search_query=FP8+training+nvidia", wiki:"https://en.wikipedia.org/wiki/Minifloat"},
  {abbr:"GPTQ / AWQ", full:"GPTQ / Activation-aware Weight Quantization", zh:"权重量化方法", cat:"推理部署",
   desc:"两种主流的训练后量化算法，把模型压到 4 位仍尽量保精度，让大模型能跑在小显卡上。",
   video:"https://www.youtube.com/results?search_query=GPTQ+AWQ+quantization", wiki:"https://en.wikipedia.org/wiki/Quantization_(signal_processing)"},
  {abbr:"GGUF", full:"GGUF", zh:"本地模型文件格式", cat:"推理部署",
   desc:"llama.cpp 生态使用的模型打包格式，把量化后的模型存成单文件，方便在个人电脑上加载运行。",
   video:"https://www.youtube.com/results?search_query=GGUF+llama.cpp", wiki:"https://en.wikipedia.org/wiki/Llama.cpp"},
  {abbr:"llama.cpp", full:"llama.cpp", zh:"轻量本地推理引擎", cat:"推理部署",
   desc:"用 C++ 写的开源项目，能在普通 CPU/笔记本上高效跑量化后的大模型，是本地 AI 的基石。",
   video:"https://www.youtube.com/results?search_query=llama.cpp", wiki:"https://en.wikipedia.org/wiki/Llama.cpp"},
  {abbr:"Ollama", full:"Ollama", zh:"本地大模型一键运行工具", cat:"推理部署",
   desc:"让你用一条命令就在本地电脑下载并运行各种开源大模型的工具，对个人离线使用极友好。",
   video:"https://www.youtube.com/results?search_query=ollama+local+LLM", wiki:"https://en.wikipedia.org/wiki/Ollama"},
  {abbr:"TensorRT", full:"TensorRT", zh:"英伟达推理加速库", cat:"推理部署",
   desc:"英伟达的高性能推理优化库，把模型针对其 GPU 深度优化以榨干算力、降低延迟。",
   video:"https://www.youtube.com/results?search_query=tensorrt+nvidia", wiki:"https://en.wikipedia.org/wiki/TensorRT"},
  {abbr:"ONNX", full:"Open Neural Network Exchange", zh:"开放神经网络交换格式", cat:"推理部署",
   desc:"一种通用的模型交换格式，让模型能在不同框架（PyTorch、TensorFlow）和硬件间迁移部署。",
   video:"https://www.youtube.com/results?search_query=ONNX+explained", wiki:"https://en.wikipedia.org/wiki/Open_Neural_Network_Exchange"},
  {abbr:"Latency", full:"Latency", zh:"延迟", cat:"推理部署",
   desc:"从发出请求到收到结果所花的时间。对话/实时场景对延迟极敏感。",
   video:"https://www.youtube.com/results?search_query=latency+vs+throughput", wiki:"https://en.wikipedia.org/wiki/Latency_(engineering)"},
  {abbr:"Throughput", full:"Throughput", zh:"吞吐量", cat:"推理部署",
   desc:"单位时间内系统能处理的请求/token 数量。和延迟常需权衡，是衡量推理服务效率的核心指标。",
   video:"https://www.youtube.com/results?search_query=throughput+LLM+serving", wiki:"https://en.wikipedia.org/wiki/Throughput"},
  {abbr:"TTFT", full:"Time To First Token", zh:"首字延迟", cat:"推理部署",
   desc:"从你发送消息到屏幕上蹦出第一个字的时间，直接决定“感觉快不快”。",
   video:"https://www.youtube.com/results?search_query=time+to+first+token+LLM", wiki:"https://en.wikipedia.org/wiki/Large_language_model"},
  {abbr:"Pruning", full:"Pruning", zh:"剪枝", cat:"推理部署",
   desc:"把模型里不重要的连接/神经元“剪掉”，让模型更小更快，是模型压缩的常用手段。",
   video:"https://www.youtube.com/results?search_query=model+pruning+neural+network", wiki:"https://en.wikipedia.org/wiki/Pruning_(artificial_neural_network)"},

  /* —— RAG / 检索 —— */
  {abbr:"Vector Database", full:"Vector Database", zh:"向量数据库", cat:"RAG检索",
   desc:"专门存储和检索“向量（embedding）”的数据库，能按语义相似度快速找到最相关内容，是 RAG 的核心存储。",
   video:"https://www.youtube.com/results?search_query=vector+database+explained", wiki:"https://en.wikipedia.org/wiki/Vector_database"},
  {abbr:"Chunking", full:"Chunking", zh:"文本切块", cat:"RAG检索",
   desc:"把长文档切成小段再做向量化的过程。切得好不好直接影响 RAG 检索的质量。",
   video:"https://www.youtube.com/results?search_query=chunking+RAG", wiki:"https://en.wikipedia.org/wiki/Retrieval-augmented_generation"},
  {abbr:"Reranking", full:"Reranking", zh:"重排序", cat:"RAG检索",
   desc:"在初步检索出一批候选后，用更精细的模型重新排序，把最相关的排到最前，提升 RAG 准确率。",
   video:"https://www.youtube.com/results?search_query=reranking+RAG", wiki:"https://en.wikipedia.org/wiki/Learning_to_rank"},
  {abbr:"Semantic Search", full:"Semantic Search", zh:"语义检索", cat:"RAG检索",
   desc:"按“意思”而非“关键词字面”来搜索，靠向量相似度实现，能搜到换了说法但意思相同的内容。",
   video:"https://www.youtube.com/results?search_query=semantic+search", wiki:"https://en.wikipedia.org/wiki/Semantic_search"},
  {abbr:"Hybrid Search", full:"Hybrid Search", zh:"混合检索", cat:"RAG检索",
   desc:"把关键词检索（如 BM25）和语义向量检索结合起来，兼顾精确匹配与语义理解。",
   video:"https://www.youtube.com/results?search_query=hybrid+search+RAG", wiki:"https://en.wikipedia.org/wiki/Search_engine"},
  {abbr:"BM25", full:"Best Matching 25", zh:"关键词检索算法", cat:"RAG检索",
   desc:"经典的基于关键词词频的文本检索打分算法，至今仍是搜索和混合检索的重要一环。",
   video:"https://www.youtube.com/results?search_query=BM25+algorithm", wiki:"https://en.wikipedia.org/wiki/Okapi_BM25"},
  {abbr:"Cosine Similarity", full:"Cosine Similarity", zh:"余弦相似度", cat:"RAG检索",
   desc:"通过两个向量夹角的余弦值衡量它们有多“像”，是向量检索里判断语义相近的常用度量。",

   desc:"“俳句”是日本最短的诗（5-7-5 共 17 个音），以极简凝练著称。Anthropic 用它命名速度最快、最省钱、最轻量的入门档——就像俳句用最少的字传达意境。",

/* ===== 渲染逻辑 ===== */
const listEl = document.getElementById('list');
const qEl = document.getElementById('q');
const countEl = document.getElementById('count');
const filtersEl = document.getElementById('filters');
let activeCat = '全部';

const cats = ['全部', ...Array.from(new Set(DATA.map(d=>d.cat)))];
filtersEl.innerHTML = cats.map(c=>`<span class="chip${c==='全部'?' active':''}" data-cat="${c}">${c}</span>`).join('');
filtersEl.addEventListener('click', e=>{
  if(!e.target.classList.contains('chip')) return;
  activeCat = e.target.dataset.cat;
  [...filtersEl.children].forEach(c=>c.classList.toggle('active', c.dataset.cat===activeCat));
  render();
});

function esc(s){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* 提取要朗读的英文：缩写 + 英文全称（去掉中文、括号、斜杠） */
function sayText(d){
  const clean = s => s.replace(/\([^)]*\)/g,'').replace(/[一-鿿]/g,'')
    .replace(/[／/]/g,' ').replace(/\s+/g,' ').trim();
  const a = /[a-zA-Z]/.test(d.abbr) ? clean(d.abbr) : '';
  const f = clean(d.full);
  if(a && f && a.toLowerCase()!==f.toLowerCase()) return a + '. ' + f;
  return a || f || d.full;
}

/* 用浏览器内置语音合成朗读英文 */
let curBtn = null;
function speak(text, btn){
  if(!('speechSynthesis' in window)){ alert('当前浏览器不支持朗读功能'); return; }
  speechSynthesis.cancel();
  if(curBtn) curBtn.classList.remove('playing');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.9;
  const v = speechSynthesis.getVoices().find(v=>/en[-_]US/i.test(v.lang)) ||
            speechSynthesis.getVoices().find(v=>/^en/i.test(v.lang));
  if(v) u.voice = v;
  curBtn = btn; if(btn) btn.classList.add('playing');
  u.onend = u.onerror = ()=>{ if(btn) btn.classList.remove('playing'); };
  speechSynthesis.speak(u);
}

function render(){
  const q = qEl.value.trim().toLowerCase();
  const items = DATA.filter(d=>{
    const matchCat = activeCat==='全部' || d.cat===activeCat;
    const hay = (d.abbr+' '+d.full+' '+d.zh+' '+d.desc).toLowerCase();
    return matchCat && (!q || hay.includes(q));
  });
  countEl.textContent = `共 ${items.length} 个名词`;
  if(!items.length){ listEl.innerHTML = '<div class="empty">没有匹配的名词，换个关键词试试 🔍</div>'; return; }
  listEl.innerHTML = items.map((d,i)=>`
    <div class="card" data-i="${i}">
      <div class="head">
        <div class="main">
          <div class="abbr">${esc(d.abbr)}<button class="say" data-say="${esc(sayText(d))}" title="点击朗读发音" aria-label="朗读发音">🔊</button></div>
          <div class="full">${esc(d.full)}</div>
          <div class="zh">${esc(d.zh)}</div>
        </div>
        <span class="cat">${esc(d.cat)}</span>
        <span class="arrow">▶</span>
      </div>
      <div class="body"><div class="body-in">
        <p class="desc">${esc(d.desc)}</p>
        <div class="links">
          <a class="vid" href="${d.video}" target="_blank" rel="noopener">▶ 看视频</a>
          <a href="${d.wiki}" target="_blank" rel="noopener">📖 查百科</a>
        </div>
      </div></div>
    </div>`).join('');
  listEl.querySelectorAll('.card').forEach(card=>{
    card.querySelector('.head').addEventListener('click',()=>card.classList.toggle('open'));
  });
  listEl.querySelectorAll('.say').forEach(btn=>{
    btn.addEventListener('click',e=>{ e.stopPropagation(); speak(btn.dataset.say, btn); });
  });
}

qEl.addEventListener('input', render);
render();
</script>
